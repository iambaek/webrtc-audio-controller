<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>Dooray Audio Controller</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
    }

    .header {
      background: linear-gradient(135deg, #16213e, #0f3460);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #0f3460;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #e94560;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header .status {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 500;
    }

    .status.active { background: #00b894; color: #fff; }
    .status.inactive { background: #636e72; color: #dfe6e9; }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #e94560;
      margin-bottom: 10px;
      font-weight: 600;
    }

    /* 마스터 토글 */
    .master-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: rgba(233, 69, 96, 0.08);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 12px;
      transition: 0.3s;
    }

    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }

    .toggle input:checked + .slider { background: #e94560; }
    .toggle input:checked + .slider::before { transform: translateX(20px); }

    /* 레벨 미터 */
    .level-meter {
      height: 8px;
      background: #2d2d44;
      border-radius: 4px;
      overflow: hidden;
      margin: 6px 0;
    }

    .level-meter .bar {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width 0.08s ease-out;
      background: linear-gradient(90deg, #00b894, #fdcb6e, #e94560);
    }

    .level-info {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #999;
    }

    .howling-badge {
      display: none;
      background: #e94560;
      color: #fff;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 8px;
      font-weight: 600;
      animation: pulse 0.6s infinite alternate;
    }

    .howling-badge.show { display: inline-block; }

    @keyframes pulse { to { opacity: 0.5; } }

    /* 슬라이더 */
    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
    }

    .control-row label {
      flex: 0 0 100px;
      font-size: 12px;
      color: #bbb;
    }

    .control-row input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      background: #2d2d44;
      border-radius: 2px;
      outline: none;
    }

    .control-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #e94560;
      cursor: pointer;
    }

    .control-row .value {
      flex: 0 0 45px;
      text-align: right;
      font-size: 11px;
      color: #fdcb6e;
      font-family: 'SF Mono', monospace;
    }

    /* 토글 행 */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .toggle-row label {
      font-size: 12px;
      color: #bbb;
    }

    .toggle-sm {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }

    .toggle-sm input { opacity: 0; width: 0; height: 0; }

    .toggle-sm .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 10px;
      transition: 0.3s;
    }

    .toggle-sm .slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }

    .toggle-sm input:checked + .slider { background: #00b894; }
    .toggle-sm input:checked + .slider::before { transform: translateX(16px); }

    /* 프리셋 버튼 */
    .presets {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .preset-btn {
      flex: 1;
      min-width: 70px;
      padding: 7px 4px;
      border: 1px solid rgba(233, 69, 96, 0.3);
      background: rgba(233, 69, 96, 0.08);
      color: #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      text-align: center;
      transition: all 0.2s;
    }

    .preset-btn:hover {
      background: rgba(233, 69, 96, 0.2);
      border-color: #e94560;
    }

    .preset-btn.active {
      background: #e94560;
      color: #fff;
      border-color: #e94560;
    }

    /* 하단 */
    .footer {
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .reset-btn {
      padding: 5px 14px;
      border: 1px solid #636e72;
      background: transparent;
      color: #b2bec3;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      transition: 0.2s;
    }

    .reset-btn:hover {
      border-color: #e94560;
      color: #e94560;
    }

    .version {
      font-size: 10px;
      color: #636e72;
    }

    /* RNNoise 섹션 강조 */
    .rnnoise-section {
      background: rgba(0, 184, 148, 0.05);
      border-left: 3px solid #00b894;
      padding-left: 13px;
    }

    .rnnoise-label {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .rnnoise-badge {
      font-size: 9px;
      background: #00b894;
      color: #fff;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 600;
    }

    /* VAD 섹션 강조 */
    .vad-section {
      background: rgba(52, 152, 219, 0.05);
      border-left: 3px solid #3498db;
      padding-left: 13px;
    }

    #vadThresholdControl,
    #vadRecoveryControl,
    #vadHysteresisControl {
      opacity: 1;
      transition: opacity 0.3s;
    }

    /* VAD 비활성화 시 제어 옅게 표시 */
    .vad-disabled #vadThresholdControl,
    .vad-disabled #vadRecoveryControl,
    .vad-disabled #vadHysteresisControl {
      opacity: 0.5;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div class="header">
    <h1>🎙️ Audio Controller</h1>
    <span class="status inactive" id="statusBadge">비활성</span>
  </div>

  <!-- 마스터 토글 -->
  <div class="master-toggle">
    <span class="toggle-label">오디오 처리 활성화</span>
    <label class="toggle">
      <input type="checkbox" id="masterToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <!-- 오디오 레벨 미터 -->
  <div class="section">
    <div class="section-title">오디오 레벨</div>
    <div class="level-meter"><div class="bar" id="levelBar"></div></div>
    <div class="level-info">
      <span id="levelDb">-∞ dB</span>
      <span class="howling-badge" id="howlingBadge">⚠ 하울링 감지</span>
      <span id="levelPeak">Peak: 0%</span>
    </div>
  </div>

  <!-- 프리셋 -->
  <div class="section">
    <div class="section-title">프리셋</div>
    <div class="presets">
      <button class="preset-btn" data-preset="quiet">🔇 조용한 환경</button>
      <button class="preset-btn" data-preset="noisy">🏢 소음 환경</button>
      <button class="preset-btn" data-preset="meeting">👥 회의실</button>
      <button class="preset-btn" data-preset="boost">🔊 볼륨 최대</button>
    </div>
  </div>

  <!-- 볼륨 컨트롤 -->
  <div class="section">
    <div class="section-title">볼륨 & 게인</div>
    <div class="control-row">
      <label>볼륨 부스트</label>
      <input type="range" id="gain" min="0.5" max="4" step="0.1" value="1.5">
      <span class="value" id="gainValue">1.5x</span>
    </div>
  </div>

  <!-- RNNoise 섹션 -->
  <div class="section rnnoise-section">
    <div class="section-title">
      <span class="rnnoise-label">
        노이즈 제거
        <span class="rnnoise-badge">RNNoise AI</span>
      </span>
    </div>
    <div class="toggle-row">
      <label>RNNoise 딥러닝 노이즈 제거</label>
      <label class="toggle-sm">
        <input type="checkbox" id="rnnoiseEnabled" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <label>브라우저 노이즈 서프레션</label>
      <label class="toggle-sm">
        <input type="checkbox" id="noiseSuppression" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- 에코 & 하울링 -->
  <div class="section">
    <div class="section-title">에코 & 하울링 방지</div>
    <div class="toggle-row">
      <label>에코 캔슬레이션</label>
      <label class="toggle-sm">
        <input type="checkbox" id="echoCancellation" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <label>하울링 자동 감지 & 억제</label>
      <label class="toggle-sm">
        <input type="checkbox" id="howlingDetection" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <label>자동 게인 컨트롤</label>
      <label class="toggle-sm">
        <input type="checkbox" id="autoGainControl" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- 음성 활동 감지 (VAD) -->
  <div class="section vad-section">
    <div class="section-title">음성 활동 감지 (VAD)</div>
    <div class="toggle-row">
      <label>자동 마이크 제어 활성화</label>
      <label class="toggle-sm">
        <input type="checkbox" id="vadEnabled" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="control-row" id="vadThresholdControl">
      <label>감지 임계값</label>
      <input type="range" id="vadThreshold" min="-60" max="-20" step="1" value="-35">
      <span class="value" id="vadThresholdValue">-35dB</span>
    </div>
    <div class="control-row" id="vadRecoveryControl">
      <label>복구 지연</label>
      <input type="range" id="vadRecoveryDelay" min="500" max="5000" step="100" value="2000">
      <span class="value" id="vadRecoveryValue">2.0s</span>
    </div>
    <div class="control-row" id="vadHysteresisControl">
      <label>히스테리시스</label>
      <input type="range" id="vadHysteresis" min="0" max="10" step="0.5" value="3">
      <span class="value" id="vadHysteresisValue">3dB</span>
    </div>
  </div>

  <!-- 필터 -->
  <div class="section">
    <div class="section-title">주파수 필터</div>
    <div class="control-row">
      <label>고역 통과 (HPF)</label>
      <input type="range" id="highPassFrequency" min="20" max="300" step="10" value="80">
      <span class="value" id="highPassValue">80Hz</span>
    </div>
    <div class="control-row">
      <label>저역 통과 (LPF)</label>
      <input type="range" id="lowPassFrequency" min="4000" max="20000" step="500" value="14000">
      <span class="value" id="lowPassValue">14kHz</span>
    </div>
  </div>

  <!-- 컴프레서 -->
  <div class="section">
    <div class="section-title">다이나믹 컴프레서</div>
    <div class="control-row">
      <label>임계값</label>
      <input type="range" id="compressorThreshold" min="-60" max="0" step="1" value="-24">
      <span class="value" id="compThreshValue">-24dB</span>
    </div>
    <div class="control-row">
      <label>비율</label>
      <input type="range" id="compressorRatio" min="1" max="20" step="0.5" value="4">
      <span class="value" id="compRatioValue">4:1</span>
    </div>
  </div>

  <!-- 하단 -->
  <div class="footer">
    <button class="reset-btn" id="resetBtn">⟲ 초기화</button>
    <button class="reset-btn" id="dashboardBtn" style="border-color:#0984e3;color:#0984e3">📊 대시보드</button>
    <span class="version">v0.2.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
