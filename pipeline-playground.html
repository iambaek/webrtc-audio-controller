<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dooray WebRTC Audio Controller — Pipeline Playground</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2e3d;
    --accent: #6c5ce7; --accent-light: #a29bfe;
    --green: #00b894; --orange: #fdcb6e; --red: #e17055;
    --blue: #74b9ff; --cyan: #81ecec; --pink: #fd79a8;
    --text: #dfe6e9; --dim: #636e72; --muted: #4a5568;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; min-height: 100vh; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { color: var(--dim); font-size: 12px; margin-top: 4px; }
  .tabs { display: flex; gap: 8px; }
  .tab { background: transparent; color: var(--dim); border: 1px solid var(--border); border-radius: 8px; padding: 6px 16px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .tab:hover:not(.active) { border-color: var(--accent); color: var(--text); }
  .main { display: flex; gap: 16px; }
  .canvas { flex: 1; background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; min-height: 380px; }
  .controls { display: flex; gap: 14px; padding: 10px 16px; border-bottom: 1px solid var(--border); align-items: center; flex-wrap: wrap; }
  .controls label { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; user-select: none; }
  .controls input[type=checkbox] { accent-color: var(--accent); }
  .controls .spacer { flex: 1; }
  .controls .status { font-size: 10px; color: var(--dim); }
  .side { width: 280px; background: var(--card); border-radius: 16px; border: 1px solid var(--border); flex-shrink: 0; }
  .side-header { padding: 10px 16px; border-bottom: 1px solid var(--border); color: var(--dim); font-size: 12px; font-weight: 600; }
  .side-body { padding: 16px; }
  .side-empty { padding: 20px; color: var(--dim); text-align: center; font-size: 13px; }
  .detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .detail-icon { font-size: 28px; }
  .detail-name { font-weight: 700; font-size: 16px; }
  .detail-file { color: var(--dim); font-size: 11px; }
  .detail-desc { background: #0d0f14; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 12px; line-height: 1.6; white-space: pre-wrap; }
  .detail-files { margin-top: 10px; }
  .detail-files .label { color: var(--dim); font-size: 11px; margin-bottom: 4px; }
  .file-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-right: 6px; margin-bottom: 4px; }
  .footer { margin-top: 12px; text-align: center; color: var(--dim); font-size: 10px; }
  svg text { user-select: none; pointer-events: none; }
  .node-group { cursor: pointer; }
  .node-group:hover rect { filter: brightness(1.2); }

  /* Howling panel */
  .howling-panel { padding: 16px; }
  .howling-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .howling-title span { color: var(--red); font-weight: 700; font-size: 14px; }
  .howling-btn { border: none; border-radius: 6px; padding: 4px 14px; font-size: 11px; cursor: pointer; color: #fff; transition: all 0.2s; }
  .howling-flow { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; align-items: center; }
  .howling-step { border-radius: 6px; padding: 6px 10px; font-size: 10px; white-space: pre-wrap; text-align: center; min-width: 68px; flex-shrink: 0; }
  .howling-arrow { color: var(--dim); font-size: 14px; flex-shrink: 0; }
  .howling-params { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; margin-top: 12px; font-size: 11px; }
  .howling-param { display: flex; justify-content: space-between; }
  .howling-param .k { color: var(--dim); }
  .howling-param .v { color: var(--text); font-family: monospace; }

  /* Architecture */
  .arch-legend { margin-top: 8px; display: flex; gap: 16px; justify-content: center; font-size: 10px; color: var(--dim); padding-bottom: 10px; }
  .arch-legend span { display: flex; align-items: center; gap: 4px; }
  .arch-legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  @media (max-width: 900px) {
    .main { flex-direction: column; }
    .side { width: 100%; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Dooray WebRTC Audio Controller</h1>
    <p>v1.0.1 — Chrome Extension Pipeline Playground</p>
  </div>
  <div class="tabs">
    <button class="tab active" data-view="pipeline">오디오 파이프라인</button>
    <button class="tab" data-view="arch">아키텍처</button>
    <button class="tab" data-view="howling">하울링 시스템</button>
    <button class="tab" data-view="vad">VAD 시스템</button>
  </div>
</div>

<div class="main">
  <div class="canvas" id="canvas"></div>
  <div class="side">
    <div class="side-header">상세 정보</div>
    <div class="side-body" id="sidePanel">
      <div class="side-empty">노드를 클릭하면 상세 정보가 표시됩니다</div>
    </div>
  </div>
</div>

<div class="footer">Dooray WebRTC Audio Controller v1.0.1 — Pipeline Playground</div>

<script>
// ── Data ──
const NODES = {
  source:      { label:"Mic Source",      icon:"🎤", desc:"MediaStreamSource\ngetUserMedia 인터셉트\nsampleRate: 48000Hz", color:"#81ecec", file:"content.js", line:"342" },
  hpf:         { label:"High-Pass",       icon:"📐", desc:"BiquadFilter (highpass)\n기본: 80Hz / Q=0.7\n저주파 잡음 제거 (바람, 진동 등)", color:"#74b9ff", file:"content.js", line:"346-349" },
  lpf:         { label:"Low-Pass",        icon:"📉", desc:"BiquadFilter (lowpass)\n기본: 14000Hz / Q=0.7\n고주파 잡음 제거 (전자 노이즈 등)", color:"#74b9ff", file:"content.js", line:"352-355" },
  rnnoise:     { label:"RNNoise AI",      icon:"🧠", desc:"AudioWorkletNode\nMozilla RNNoise (WASM base64 내장)\n딥러닝 노이즈 제거\n480 샘플 프레임 / 별도 오디오 스레드", color:"#fd79a8", file:"rnnoise-worklet.js", line:"611-749", optional:true },
  compressor:  { label:"Compressor",      icon:"🔊", desc:"DynamicsCompressor\nthreshold: -24dB / ratio: 4:1\nknee: 10 / attack: 3ms\nrelease: 250ms\n다이나믹 레인지 제어", color:"#fdcb6e", file:"content.js", line:"376-381" },
  preAnalyser: { label:"Pre-Gain Analyser", icon:"📊", desc:"AnalyserNode (FFT 4096)\nsmoothing: 0.3\n주파수 해상도: ~11.7Hz/bin\n하울링 감지 + VAD 음성 감지 (dead-end 분기)\n게인 영향 없는 안정적 분석", color:"#e17055", file:"content.js", line:"389-391", branch:true },
  notch0:      { label:"Notch #0",        icon:"🔇", desc:"BiquadFilter\nallpass(투명) ↔ notch(억제) 전환\nQ=10 (넓은 대역)\n프리-알로케이트 (disconnect 없음)", color:"#6c5ce7", file:"content.js", line:"400-407" },
  notch1:      { label:"Notch #1",        icon:"🔇", desc:"BiquadFilter\nallpass ↔ notch 전환\n동적 주파수 추적\n±80Hz 유사 주파수 병합", color:"#6c5ce7", file:"content.js", line:"400-407" },
  notch2:      { label:"Notch #2",        icon:"🔇", desc:"BiquadFilter\nallpass ↔ notch 전환\n최대 3개 동시 활성\n3초 후 자동 해제", color:"#6c5ce7", file:"content.js", line:"400-407" },
  gain:        { label:"Gain",            icon:"🔉", desc:"GainNode\n기본: 1.5x 볼륨 부스트\n하울링 시 0.1로 감소 (90%)\n복원: 0.5s time constant", color:"#00b894", file:"content.js", line:"384-385" },
  analyser:    { label:"Post-Gain Analyser", icon:"📈", desc:"AnalyserNode (FFT 2048)\nsmoothing: 0.8\n레벨 미터용 (RMS, peak, dB)\nDashboard 시각화 데이터 제공", color:"#74b9ff", file:"content.js", line:"394-396" },
  dest:        { label:"Destination",     icon:"📡", desc:"MediaStreamDestination\nWebRTC 피어 연결로 전송\n비디오 트랙 보존 (원본 유지)", color:"#81ecec", file:"content.js", line:"343" },
};

const ARCH = [
  { id:"popup",      label:"Popup UI",          icon:"🖥️",  desc:"popup.html / popup.js\n설정 조절 인터페이스\nchrome.storage.local 연동\nthrottle(50ms) 적용 슬라이더\nchangeId 기반 storage 추적", color:"#00b894", files:["popup.html","popup.js"] },
  { id:"dashboard",  label:"Dashboard",         icon:"📊",  desc:"dashboard.html / dashboard.js\n실시간 오디오 시각화\nFFT 스펙트럼 / 파형 (RMS 기반 근사)\n60fps Canvas 렌더링", color:"#74b9ff", files:["dashboard.html","dashboard.js"] },
  { id:"background", label:"Service Worker",    icon:"⚙️",  desc:"background.js\n배지 업데이트 (ON/OFF 표시)\nchrome.runtime 메시지 라우팅\nManifest V3 서비스 워커", color:"#fdcb6e", files:["background.js"] },
  { id:"bridge",     label:"Bridge (ISOLATED)",  icon:"🌉",  desc:"bridge.js\nMAIN ↔ ISOLATED world 중개\nwindow.postMessage 양방향\n5초 타임아웃 에러 응답\nExtension URL 전달", color:"#a29bfe", files:["bridge.js"] },
  { id:"content",    label:"Content (MAIN)",     icon:"🎵",  desc:"content.js\ngetUserMedia 인터셉트\n오디오 파이프라인 구축 (12개 노드)\n하울링 감지 & 노치 필터 억제\nVAD 음성 감지 & 자동 마이크 제어\nRTCPeerConnection 래핑", color:"#fd79a8", files:["content.js"] },
  { id:"worklet",    label:"AudioWorklet",       icon:"🧠",  desc:"rnnoise-worklet.js (1.9MB)\nWASM binary base64 내장\nEmscripten glue code\natob polyfill (AudioWorkletGlobalScope)\n별도 오디오 렌더링 스레드", color:"#81ecec", files:["rnnoise-worklet.js"] },
];

const MSG_FLOWS = [
  { from:0, to:2, label:"chrome.runtime.sendMessage" },
  { from:2, to:3, label:"chrome.runtime.onMessage" },
  { from:3, to:4, label:"window.postMessage" },
  { from:4, to:5, label:"audioWorklet.addModule" },
  { from:0, to:1, label:"chrome.storage", dashed:true },
];

const HOWLING = {
  params: [
    ["감지 주기","50ms (20Hz)"], ["FFT 크기","4096 bins (~11.7Hz/bin)"],
    ["노치 Q값","10 (넓은 대역)"], ["감지 임계","15dB 돌출"],
    ["최소 에너지","-45dB"], ["감지 반응","2회 연속 (100ms)"],
    ["복원 대기","3초 (60회×50ms)"], ["억제 게인","0.1 (90% 감소)"],
    ["노치 유지","3초 (감지 해소 후)"], ["주파수 대역","200-4000Hz"],
  ],
  flow: ["FFT 분석\n(preGainAnalyser)","피크 탐색\n(200-4000Hz)","연속 감지\n판정 (≥2회)","노치 활성화\n+ 게인 0.1","3초 미감지\n→ 복원"],
};

const VAD = {
  params: [
    ["감지 주기","50ms (20Hz)"], ["감지 임계","-35dB (기본값)"],
    ["히스테리시스","3dB"], ["복구 지연","2000ms (기본값)"],
    ["분석 소스","preGainAnalyser"], ["감지 방식","RMS → dB 변환"],
    ["마이크 제어","enabled 토글"], ["전환 방식","setTargetAtTime (50ms)"],
    ["안전 기본값","항상 마이크 ON"], ["독립 동작","하울링 감지와 병행"],
  ],
  flow: ["RMS 분석\n(preGainAnalyser)","dB 변환\n(20·log₁₀)","임계값 비교\n(히스테리시스)","음성→마이크 ON\n침묵→타이머 시작","복구 지연 경과\n→ 마이크 OFF"],
};

// ── State ──
let state = { view:"pipeline", selected:null, rnnoise:true, signal:true, howling:false, vadActive:true };
let animFrame = null;
let signalPhases = [];

// ── Render ──
function render() {
  const c = document.getElementById("canvas");
  if (state.view === "pipeline") renderPipeline(c);
  else if (state.view === "arch") renderArch(c);
  else if (state.view === "howling") renderHowling(c);
  else if (state.view === "vad") renderVAD(c);
  renderSide();
  renderTabs();
}

function renderTabs() {
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.view === state.view);
  });
}

// ── Pipeline View ──
function renderPipeline(container) {
  const chain = ["source","hpf","lpf",...(state.rnnoise?["rnnoise"]:[]),"compressor","notch0","notch1","notch2","gain","analyser","dest"];
  const W = 920, H = 330, NW = 72, NH = 62;
  const gap = (W - 32 - chain.length * NW) / (chain.length - 1);
  const startX = 16, startY = 56;

  const pos = {};
  chain.forEach((id, i) => { pos[id] = { x: startX + i * (NW + gap), y: startY }; });
  const compP = pos["compressor"];
  if (compP) pos["preAnalyser"] = { x: compP.x, y: startY + NH + 58 };

  let svg = `<div class="controls">
    <label><input type="checkbox" id="chkRnn" ${state.rnnoise?"checked":""}> RNNoise AI</label>
    <label><input type="checkbox" id="chkSig" ${state.signal?"checked":""}> 신호 애니메이션</label>
    <label style="color:${state.howling?"var(--red)":"var(--text)"}"><input type="checkbox" id="chkHowl" ${state.howling?"checked":""}> 하울링 시뮬레이션</label>
    <label style="color:${state.vadActive?"#3498db":"var(--text)"}"><input type="checkbox" id="chkVad" ${state.vadActive?"checked":""}> VAD 자동 마이크</label>
    <div class="spacer"></div>
    <span class="status">${chain.length}개 노드 • ${state.rnnoise?"RNNoise ON":"RNNoise OFF"}${state.howling?" • 하울링 감지됨":""}${state.vadActive?" • VAD ON":""}</span>
  </div>`;

  svg += `<svg width="100%" viewBox="0 0 ${W} ${H}" id="pipelineSvg">`;
  svg += `<text x="${W/2}" y="30" text-anchor="middle" fill="var(--dim)" font-size="11">`;
  svg += `source → HPF → LPF → ${state.rnnoise?"[RNNoise] → ":""}compressor → notch[0..2] → gain → analyser → destination</text>`;

  // Connections
  const conns = [];
  for (let i = 0; i < chain.length - 1; i++) {
    const a = pos[chain[i]], b = pos[chain[i+1]];
    const isHowlSeg = state.howling && i >= chain.indexOf("notch0") - 1;
    const col = isHowlSeg ? "var(--red)" : "var(--muted)";
    conns.push({ x1:a.x+NW, y1:a.y+NH/2, x2:b.x, y2:b.y+NH/2, col, idx:i });
    svg += arrow(a.x+NW, a.y+NH/2, b.x, b.y+NH/2, col, false, "", `c${i}`);
  }

  // Branch
  if (pos["preAnalyser"]) {
    const cp = pos["compressor"], pa = pos["preAnalyser"];
    svg += arrow(cp.x+NW/2, cp.y+NH, pa.x+NW/2, pa.y, "var(--red)", true, "분석 분기", "branch");
  }

  // Howling feedback
  if (state.howling && pos["preAnalyser"] && pos["notch0"]) {
    const pa = pos["preAnalyser"], n0 = pos["notch0"];
    svg += `<path d="M ${pa.x+NW} ${pa.y+NH/2} Q ${n0.x+NW/2} ${pa.y+NH/2} ${n0.x+NW/2} ${n0.y+NH}" fill="none" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ah-fb)" opacity="0.6"/>`;
    svg += `<defs><marker id="ah-fb" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="var(--red)"/></marker></defs>`;
    svg += `<text x="${(pa.x+NW+n0.x+NW/2)/2}" y="${pa.y+NH/2+14}" text-anchor="middle" fill="var(--red)" font-size="9" font-weight="600">노치 필터 제어</text>`;
  }

  // Signal dots (will be animated)
  if (state.signal) {
    conns.forEach((c, i) => {
      if (signalPhases.length <= i) signalPhases.push(Math.random());
      svg += `<circle class="sigdot" data-x1="${c.x1}" data-y1="${c.y1}" data-x2="${c.x2}" data-y2="${c.y2}" cx="${c.x1}" cy="${c.y1}" r="4" fill="${state.howling && i >= chain.indexOf("notch0")-1 ? "var(--red)" : "var(--green)"}" opacity="0.9"/>`;
    });
  }

  // Nodes
  chain.forEach(id => {
    const n = NODES[id], p = pos[id];
    svg += nodeRect(id, n, p.x, p.y, NW, NH, id === "rnnoise" && !state.rnnoise ? 0.35 : 1);
  });
  if (pos["preAnalyser"]) {
    const n = NODES["preAnalyser"], p = pos["preAnalyser"];
    svg += nodeRect("preAnalyser", n, p.x, p.y, NW, NH, 1);
  }

  // Legend
  svg += `<g transform="translate(${W-210},${H-48})">`;
  svg += `<rect x="0" y="0" width="200" height="42" rx="6" fill="var(--bg)" fill-opacity="0.8" stroke="var(--border)" stroke-width="0.5"/>`;
  svg += `<line x1="10" y1="14" x2="40" y2="14" stroke="var(--muted)" stroke-width="1.5"/><text x="46" y="17" fill="var(--dim)" font-size="9">메인 체인</text>`;
  svg += `<line x1="110" y1="14" x2="140" y2="14" stroke="var(--muted)" stroke-width="1.5" stroke-dasharray="5 3"/><text x="146" y="17" fill="var(--dim)" font-size="9">분석 분기</text>`;
  svg += `<circle cx="20" cy="32" r="4" fill="var(--green)"/><text x="30" y="35" fill="var(--dim)" font-size="9">신호</text>`;
  svg += `<circle cx="90" cy="32" r="4" fill="var(--red)"/><text x="100" y="35" fill="var(--dim)" font-size="9">하울링</text>`;
  svg += `</g>`;

  svg += `</svg>`;
  container.innerHTML = svg;

  // Event listeners
  document.getElementById("chkRnn").onchange = e => { state.rnnoise = e.target.checked; render(); };
  document.getElementById("chkSig").onchange = e => { state.signal = e.target.checked; render(); };
  document.getElementById("chkHowl").onchange = e => { state.howling = e.target.checked; render(); };
  document.getElementById("chkVad").onchange = e => { state.vadActive = e.target.checked; render(); };
  container.querySelectorAll(".node-group").forEach(g => {
    g.onclick = () => { const id = g.dataset.id; state.selected = state.selected === id ? null : id; renderSide(); highlightNode(); };
  });

  highlightNode();
  if (state.signal) startSignalAnim();
  else stopSignalAnim();
}

function nodeRect(id, n, x, y, w, h, opacity) {
  const sel = state.selected === id;
  const isNotch = id.startsWith("notch");
  const border = sel ? n.color : (state.howling && isNotch) ? "var(--red)" : "var(--border)";
  const bg = sel ? n.color + "20" : "var(--card)";
  const dash = n.optional ? "6 3" : n.branch ? "4 4" : "none";
  let s = `<g class="node-group" data-id="${id}" opacity="${opacity}">`;
  s += `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="10" fill="${bg}" stroke="${border}" stroke-width="${sel?2:1}" stroke-dasharray="${dash}"/>`;
  s += `<text x="${x+w/2}" y="${y+h*0.35}" text-anchor="middle" fill="${n.color}" font-size="18">${n.icon}</text>`;
  const lines = n.label.split(" ");
  if (lines.length <= 2) {
    lines.forEach((l,i) => { s += `<text x="${x+w/2}" y="${y+h*0.58+i*12}" text-anchor="middle" fill="var(--text)" font-size="9.5" font-weight="500">${l}</text>`; });
  } else {
    s += `<text x="${x+w/2}" y="${y+h*0.62}" text-anchor="middle" fill="var(--text)" font-size="9" font-weight="500">${n.label}</text>`;
  }
  if (n.optional) s += `<text x="${x+w-6}" y="${y+12}" text-anchor="end" fill="var(--dim)" font-size="7">opt</text>`;
  if (state.howling && isNotch) s += `<circle cx="${x+w-7}" cy="${y+9}" r="3.5" fill="var(--red)"><animate attributeName="opacity" values="1;0.3;1" dur="0.6s" repeatCount="indefinite"/></circle>`;
  s += `</g>`;
  return s;
}

function arrow(x1, y1, x2, y2, color, dashed, label, id) {
  let s = `<defs><marker id="ah-${id}" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="${color}"/></marker></defs>`;
  s += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="1.5" ${dashed?'stroke-dasharray="5 3"':""} marker-end="url(#ah-${id})"/>`;
  if (label) s += `<text x="${(x1+x2)/2}" y="${(y1+y2)/2-6}" text-anchor="middle" fill="var(--dim)" font-size="8">${label}</text>`;
  return s;
}

function highlightNode() {
  document.querySelectorAll(".node-group").forEach(g => {
    const id = g.dataset.id;
    const sel = state.selected === id;
    g.querySelector("rect").setAttribute("stroke-width", sel ? "2.5" : "1");
  });
}

// Signal animation
function startSignalAnim() {
  stopSignalAnim();
  const dots = document.querySelectorAll(".sigdot");
  if (!dots.length) return;
  const speed = 0.008;
  function tick() {
    dots.forEach((dot, i) => {
      if (signalPhases.length <= i) signalPhases.push(Math.random());
      signalPhases[i] = (signalPhases[i] + speed) % 1;
      const x1 = +dot.dataset.x1, y1 = +dot.dataset.y1, x2 = +dot.dataset.x2, y2 = +dot.dataset.y2;
      dot.setAttribute("cx", x1 + (x2 - x1) * signalPhases[i]);
      dot.setAttribute("cy", y1 + (y2 - y1) * signalPhases[i]);
    });
    animFrame = requestAnimationFrame(tick);
  }
  animFrame = requestAnimationFrame(tick);
}
function stopSignalAnim() { if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; } }

// ── Architecture View ──
function renderArch(container) {
  const W = 920, H = 300, LW = 118, LH = 80;
  const positions = ARCH.map((_, i) => ({
    x: 28 + i * ((W - 56 - LW) / (ARCH.length - 1)),
    y: (H - LH) / 2
  }));

  let svg = `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;padding:10px 0">`;

  // World labels
  svg += `<text x="${positions[4].x+LW/2}" y="22" text-anchor="middle" fill="var(--pink)" font-size="10" font-weight="600" opacity="0.7">MAIN World</text>`;
  svg += `<text x="${positions[3].x+LW/2}" y="22" text-anchor="middle" fill="var(--accent-light)" font-size="10" font-weight="600" opacity="0.7">ISOLATED World</text>`;
  svg += `<text x="${(positions[0].x+positions[2].x+LW)/2}" y="22" text-anchor="middle" fill="var(--dim)" font-size="10" font-weight="600" opacity="0.5">Extension Context</text>`;

  // Flows
  MSG_FLOWS.forEach((f, i) => {
    const a = positions[f.from], b = positions[f.to];
    svg += `<line x1="${a.x+LW}" y1="${a.y+LH/2}" x2="${b.x}" y2="${b.y+LH/2}" stroke="var(--muted)" stroke-width="1.2" ${f.dashed?'stroke-dasharray="6 4"':""}/>`;
    svg += `<text x="${(a.x+LW+b.x)/2}" y="${a.y+LH/2-10}" text-anchor="middle" fill="var(--dim)" font-size="7.5">${f.label}</text>`;
    svg += `<text x="${(a.x+LW+b.x)/2}" y="${a.y+LH/2+14}" text-anchor="middle" fill="var(--dim)" font-size="11">⇄</text>`;
  });

  // Layer cards
  ARCH.forEach((layer, i) => {
    const p = positions[i];
    const sel = state.selected === layer.id;
    svg += `<g class="node-group" data-id="${layer.id}">`;
    svg += `<rect x="${p.x}" y="${p.y}" width="${LW}" height="${LH}" rx="10" fill="${sel?layer.color+'15':'var(--card)'}" stroke="${sel?layer.color:'var(--border)'}" stroke-width="${sel?2:1}"/>`;
    svg += `<text x="${p.x+LW/2}" y="${p.y+28}" text-anchor="middle" fill="${layer.color}" font-size="20">${layer.icon}</text>`;
    svg += `<text x="${p.x+LW/2}" y="${p.y+48}" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">${layer.label}</text>`;
    svg += `<text x="${p.x+LW/2}" y="${p.y+62}" text-anchor="middle" fill="var(--dim)" font-size="8">${layer.files[0]}</text>`;
    svg += `</g>`;
  });

  svg += `</svg>`;

  svg += `<div class="arch-legend">`;
  svg += `<span><span class="dot" style="background:var(--muted)"></span> 직접 통신</span>`;
  svg += `<span><span class="dot" style="background:var(--muted);border:1px dashed var(--dim)"></span> 간접 연동 (storage)</span>`;
  svg += `<span>⇄ 양방향</span>`;
  svg += `</div>`;

  container.innerHTML = svg;
  container.querySelectorAll(".node-group").forEach(g => {
    g.onclick = () => { const id = g.dataset.id; state.selected = state.selected === id ? null : id; renderSide(); highlightNode(); };
  });
  highlightNode();
  stopSignalAnim();
}

// ── Side Panel ──
function renderSide() {
  const panel = document.getElementById("sidePanel");
  const id = state.selected;
  if (!id) { panel.innerHTML = `<div class="side-empty">노드를 클릭하면 상세 정보가 표시됩니다</div>`; return; }

  const n = NODES[id] || ARCH.find(a => a.id === id);
  if (!n) { panel.innerHTML = `<div class="side-empty">노드를 클릭하면 상세 정보가 표시됩니다</div>`; return; }

  let html = `<div class="detail-header">`;
  html += `<div class="detail-icon">${n.icon}</div>`;
  html += `<div><div class="detail-name" style="color:${n.color}">${n.label}</div>`;
  if (n.file) html += `<div class="detail-file">${n.file}:${n.line||""}</div>`;
  html += `</div></div>`;
  html += `<div class="detail-desc">${n.desc}</div>`;

  if (n.files) {
    html += `<div class="detail-files"><div class="label">관련 파일:</div>`;
    n.files.forEach(f => { html += `<span class="file-tag" style="background:${n.color}20;color:${n.color}">${f}</span>`; });
    html += `</div>`;
  }

  // Extra info for specific nodes
  if (id === "compressor") {
    html += `<div style="margin-top:12px;background:#0d0f14;border-radius:8px;padding:10px;font-size:11;color:var(--text)">`;
    html += `<div style="color:var(--dim);margin-bottom:4px;font-weight:600">파라미터</div>`;
    [["threshold","-24dB"],["ratio","4:1"],["knee","10dB"],["attack","3ms"],["release","250ms"]].forEach(([k,v]) => {
      html += `<div style="display:flex;justify-content:space-between"><span style="color:var(--dim)">${k}</span><span style="font-family:monospace">${v}</span></div>`;
    });
    html += `</div>`;
  }
  if (id.startsWith("notch")) {
    html += `<div style="margin-top:12px;padding:8px;border-radius:8px;border:1px solid ${state.howling?'var(--red)':'var(--border)'}40;font-size:11">`;
    html += `<span style="color:${state.howling?'var(--red)':'var(--dim)'}">상태: ${state.howling?"🔴 활성 (notch)":"🟢 대기 (allpass)"}</span>`;
    html += `</div>`;
  }
  if (id === "gain") {
    html += `<div style="margin-top:12px;padding:8px;border-radius:8px;border:1px solid ${state.howling?'var(--red)':'var(--green)'}40;font-size:11">`;
    html += `<span style="color:${state.howling?'var(--red)':'var(--green)'}">현재 게인: ${state.howling?"0.1x (억제됨)":"1.5x (정상)"}</span>`;
    html += `</div>`;
  }
  if (id === "preAnalyser") {
    html += `<div style="margin-top:12px;padding:8px;border-radius:8px;border:1px solid ${state.vadActive?'#3498db':'var(--border)'}40;font-size:11">`;
    html += `<span style="color:${state.vadActive?'#3498db':'var(--dim)'}">VAD 상태: ${state.vadActive?"🔵 활성 (음성 감지 중)":"⚪ 비활성"}</span>`;
    html += `</div>`;
    if (state.vadActive) {
      html += `<div style="margin-top:8px;background:#0d0f14;border-radius:8px;padding:10px;font-size:11;color:var(--text)">`;
      html += `<div style="color:var(--dim);margin-bottom:4px;font-weight:600">VAD 파라미터</div>`;
      [["임계값","-35dB"],["히스테리시스","3dB"],["복구 지연","2000ms"],["감지 주기","50ms"]].forEach(([k,v]) => {
        html += `<div style="display:flex;justify-content:space-between"><span style="color:var(--dim)">${k}</span><span style="font-family:monospace">${v}</span></div>`;
      });
      html += `</div>`;
    }
  }

  panel.innerHTML = html;
}
